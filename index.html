<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="card">
        <h1>Tip Calculator</h1>

        <!-- Creating labels for the input values -->
        <label for="bill">Bill Amount ($)</label>
        <input type="number" id="bill" placeholder="e.g. 45,000" min="0" />

        <label for="tip">Tip percentage(%)</label>
        <input type="number" id="tip" placeholder="e.g. 15" min="o" max="100">

        <label for="people">Number of people</label>
        <input type="number" id="people" placeholder="e.g. 2" min="1">


        <div class="results">
            <div class="result-row">
                <span>Tip Amount</span>
                <span class="value" id="tip-amount">$0.00</span>
            </div>

            <div class="result-row total">
                <span>Total per person</span>
                <span class="value" id="tip-per-person">$0.00</span>
            </div>

        </div>
    </div>


    <script src="script.js"></script>
</body>

</html>
